<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0c0c12">
  <title>REPLICATOR 2</title>

  <!--
  ╔══════════════════════════════════════════════════════╗
  ║  REPLICATOR 2 — Interface de controle               ║

  ╚══════════════════════════════════════════════════════╝
  -->

  <script>
    // ─── CONFIGURATION ───────────────────────────────────────────
    const CONFIG = {
      OCTOPRINT_URL:  "http://192.168.1.42",   // IP du Raspberry Pi
      API_KEY:        "VOTRE_CLE_API_ICI",      // Cle API OctoPrint
      ADMIN_PASSWORD: "admin2026",              // Mot de passe mode admin
      DEFAULT_FEED:   1500,                     // Vitesse par defaut (mm/min)
      DEFAULT_STEP:   10,                       // Pas de jog par defaut (mm)
    }

    // ─── CHOREOGRAPHIES ──────────────────────────────────────────
    // Modifier le G-code de chaque choreographie ici
    const CHOREOS = [
      {
        id: 1,
        gcode: [
          "G28 XYZ",           // Retour origine
          "G1 Z20 F500",       // Lever la tete
          "G1 X150 F1500",     // Aller a droite
          "G4 P2000",          // Pause 2s
          "G1 X0 Y0 Z0 F2000" // Retour
        ]
      },
      {
        id: 2,
        gcode: [
          "G28 XYZ",
          "G1 Z10 F500",
          "G1 X200 F800",
          "G1 X0 F800",
          "G1 X200 F800",
          "G1 X0 F800",
          "G1 Z0 F500"
        ]
      },
      {
        id: 3,
        gcode: [
          "G28 XYZ",
          "G1 Z5 F500",
          "G1 X50 Y50 F1200",
          "G1 X150 Y50 F1200",
          "G1 X150 Y150 F1200",
          "G1 X50 Y150 Z20 F1200",
          "G1 X50 Y50 Z40 F1200",
          "G1 X0 Y0 Z0 F2000"
        ]
      },
      {
        id: 4,
        gcode: [
          "G28 XYZ",
          "G1 Z30 F300",
          "G1 X50 F800",
          "G4 P1500",
          "G1 X120 F600",
          "G4 P1500",

          "G4 P1500",
          "G1 X0 Y0 Z0 F2000"
        ]
      }
    ]
    // ─────────────────────────────────────────────────────────────
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:        #0c0c12;
      --bg2:       #0e0e1a;
      --bg3:       #08080f;
      --border:    #1e1e2e;
      --border2:   #2a2a4a;
      --accent:    #7c6af7;
      --accent2:   #c0b8ff;
      --muted:     #3a3a5a;
      --dim:       #444;
      --green:     #27ae60;
      --orange:    #e67e22;
      --red:       #c0392b;
      --red-bg:    #0f0808;
      --red-border:#4a1a1a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--accent2);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.5s infinite;
    }
    .status-dot.offline { background: var(--red); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .app-title { font-size: 13px; letter-spacing: .18em; color: var(--accent2); }
    .topbar-right { display: flex; gap: 6px; }

    /* ── PILLS ── */
    .pill {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      cursor: pointer;
      letter-spacing: .06em;
      transition: all .15s;
      font-family: inherit;
    }
    .pill.active { background: var(--bg2); color: var(--accent2); border-color: var(--border2); }
    .pill:active { transform: scale(.96); }

    /* ── BODY ── */
    .body { flex: 1; overflow-y: auto; padding: 18px; }
    .body::-webkit-scrollbar { width: 0; }

    /* ── SECTION ── */
    .section { margin-bottom: 22px; }
    .section-title {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* ── CHOREO BUTTONS ── */
    .choreo-list { display: flex; flex-direction: column; gap: 8px; }
    .choreo-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all .15s;
      position: relative;
      overflow: hidden;
      text-align: left;
      width: 100%;
    }
    .choreo-btn:hover { border-color: var(--border2); }
    .choreo-btn:active { transform: scale(.98); }
    .choreo-btn.running { border-color: var(--accent); }
    .choreo-btn.disabled { opacity: .4; cursor: not-allowed; }
    .choreo-name { font-size: 13px; color: var(--accent2); letter-spacing: .1em; display: block; margin-bottom: 3px; }
    .choreo-sub { font-size: 10px; color: var(--dim); }
    .choreo-num { font-size: 22px; color: var(--border2); }
    .choreo-progress {
      position: absolute; bottom: 0; left: 0;
      height: 2px; background: var(--accent); width: 0;
      transition: width .08s linear;
    }

    /* ── ACTION BUTTONS ── */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .action-btn {
      padding: 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--dim);
      font-size: 11px;
      cursor: pointer;
      letter-spacing: .06em;
      transition: all .15s;
      font-family: inherit;
      text-align: center;
    }
    .action-btn:hover { border-color: var(--border2); color: #999; }
    .action-btn:active { transform: scale(.97); }
    .action-btn.fan-on { border-color: var(--green); color: var(--green); background: #0a150d; }
    .action-btn.estop { border-color: var(--red-border); color: var(--red); background: var(--red-bg); }
    .action-btn.estop:hover { background: #150a0a; border-color: var(--red); }

    /* ── ADMIN : JOG ── */
    .jog-wrap { display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap; }
    .jog-xy { display: grid; grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(3, 40px); gap: 5px; }
    .jb {
      width: 40px; height: 40px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: #888; font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .1s;
      font-family: inherit;
    }
    .jb:hover { border-color: var(--border2); color: var(--accent2); }
    .jb:active { transform: scale(.93); background: #12122a; }
    .jb.home { color: var(--muted); font-size: 16px; }
    .jb.empty { visibility: hidden; }
    .jog-z { display: flex; flex-direction: column; gap: 5px; }
    .jog-params { display: flex; flex-direction: column; gap: 8px; }
    .param-row { display: flex; align-items: center; gap: 8px; }
    .param-label { font-size: 9px; color: var(--muted); width: 55px; letter-spacing: .06em; }
    .param-input {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent2);
      font-size: 12px;
      padding: 6px 10px;
      width: 80px;
      font-family: inherit;
    }
    .param-input:focus { outline: none; border-color: var(--border2); }

    /* ── ADMIN : TEMP ── */
    .temp-row { display: flex; gap: 8px; }
    .temp-card {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .temp-label { font-size: 9px; color: var(--muted); letter-spacing: .12em; margin-bottom: 5px; }
    .temp-val { font-size: 24px; color: var(--orange); font-weight: 500; }
    .temp-status { font-size: 9px; color: var(--muted); margin-top: 3px; }

    /* ── ADMIN : TERMINAL ── */
    .terminal {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 10px;
      line-height: 2;
      height: 90px;
      overflow-y: auto;
      margin-bottom: 8px;
    }
    .terminal::-webkit-scrollbar { width: 0; }
    .t-ok  { color: var(--green); }
    .t-info{ color: var(--accent); }
    .t-err { color: var(--red); }
    .t-cmd { color: #666; }
    .terminal-row { display: flex; gap: 8px; }
    .gcode-inp {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent2);
      font-size: 11px;
      padding: 10px 12px;
      font-family: inherit;
    }
    .gcode-inp:focus { outline: none; border-color: var(--border2); }
    .gcode-inp::placeholder { color: var(--muted); }
    .gcode-send {
      background: #12122a;
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--accent);
      font-size: 11px;
      padding: 10px 16px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: .05em;
    }
    .gcode-send:active { transform: scale(.96); }

    /* ── ADMIN : PASSWORD ── */
    .auth-overlay {
      position: fixed; inset: 0;
      background: rgba(8,8,15,.96);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 100;
    }
    .auth-title { font-size: 11px; color: var(--muted); letter-spacing: .15em; }
    .auth-input {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent2);
      font-size: 14px;
      padding: 12px 16px;
      width: 220px;
      text-align: center;
      font-family: inherit;
      letter-spacing: .1em;
    }
    .auth-input:focus { outline: none; border-color: var(--accent); }
    .auth-btn {
      background: #12122a;
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--accent);
      font-size: 11px;
      padding: 10px 30px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: .1em;
    }
    .auth-err { font-size: 10px; color: var(--red); letter-spacing: .08em; }

    /* ── FOOTER ── */
    .footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      background: var(--bg3);
      flex-shrink: 0;
    }
    .pos { display: flex; gap: 16px; }
    .pos-axis { display: flex; gap: 5px; align-items: baseline; }
    .pos-l { font-size: 9px; color: var(--muted); letter-spacing: .1em; }
    .pos-v { font-size: 12px; color: var(--accent); min-width: 42px; }
    .conn-info { font-size: 9px; color: var(--muted); letter-spacing: .05em; }

    /* ── HIDDEN ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="status-dot" id="status-dot"></div>
      <span class="app-title">REPLICATOR 2</span>
    </div>
    <div class="topbar-right">
      <button class="pill active" id="lang-btn" onclick="toggleLang()">FR</button>
      <button class="pill active" id="v-btn" onclick="setMode('visitor')">Visiteur</button>
      <button class="pill" id="a-btn" onclick="setMode('admin')">Admin</button>
    </div>
  </div>

  <!-- BODY -->
  <div class="body">

    <!-- ── VUE VISITEUR ── -->
    <div id="visitor-view">

      <div class="section">
        <div class="section-title" id="t-choreo">Choreographies</div>
        <div class="choreo-list" id="choreo-list"></div>
      </div>

      <div class="section">
        <div class="section-title" id="t-actions">Actions</div>
        <div class="grid2">
          <button class="action-btn" id="fan-btn" onclick="toggleFan()">—</button>
          <button class="action-btn estop" id="stop-btn" onclick="eStop()">—</button>
        </div>
      </div>

    </div>

    <!-- ── VUE ADMIN ── -->
    <div id="admin-view" class="hidden">

      <div class="section">
        <div class="section-title" id="t-jog">Deplacement manuel</div>
        <div class="jog-wrap">
          <div>
            <div style="font-size:9px;color:var(--muted);margin-bottom:6px;letter-spacing:.1em" id="t-xy">X / Y</div>
            <div class="jog-xy">
              <div class="jb empty"></div>
              <button class="jb" onclick="jog('Y', 1)">Y+</button>
              <div class="jb empty"></div>
              <button class="jb" onclick="jog('X',-1)">X-</button>
              <button class="jb home" onclick="homeAll()">⌂</button>
              <button class="jb" onclick="jog('X', 1)">X+</button>
              <div class="jb empty"></div>
              <button class="jb" onclick="jog('Y',-1)">Y-</button>
              <div class="jb empty"></div>
            </div>
          </div>
          <div>
            <div style="font-size:9px;color:var(--muted);margin-bottom:6px;letter-spacing:.1em">Z</div>
            <div class="jog-z">
              <button class="jb" onclick="jog('Z', 1)">Z+</button>
              <button class="jb" onclick="jog('Z',-1)">Z-</button>
            </div>
          </div>
          <div class="jog-params">
            <div class="param-row">
              <span class="param-label" id="t-step">Pas (mm)</span>
              <input class="param-input" id="step" type="number" value="10" min="0.1" max="100" step="0.1">
            </div>
            <div class="param-row">
              <span class="param-label" id="t-speed">Vitesse</span>
              <input class="param-input" id="feed" type="number" value="1500" min="100" max="5000" step="100">
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" id="t-temps">Temperatures</div>
        <div class="temp-row">
          <div class="temp-card">
            <div class="temp-label" id="t-nozzle-l">BUSE</div>
            <div class="temp-val" id="tv-nozzle">--°</div>
            <div class="temp-status" id="t-nozzle-s">cible : OFF</div>
          </div>
          <div class="temp-card">
            <div class="temp-label" id="t-bed-l">PLATEAU</div>
            <div class="temp-val" id="tv-bed">--°</div>
            <div class="temp-status" id="t-bed-s">cible : OFF</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title" id="t-term-title">Terminal G-code</div>
        <div class="terminal" id="log"></div>
        <div class="terminal-row">
          <input class="gcode-inp" id="gcin" placeholder="G1 X100 F1500"
            onkeydown="if(event.key==='Enter') sendGcode()">
          <button class="gcode-send" id="t-send" onclick="sendGcode()">SEND</button>
        </div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="pos">
      <div class="pos-axis"><span class="pos-l">X</span><span class="pos-v" id="px">--</span></div>
      <div class="pos-axis"><span class="pos-l">Y</span><span class="pos-v" id="py">--</span></div>
      <div class="pos-axis"><span class="pos-l">Z</span><span class="pos-v" id="pz">--</span></div>
    </div>
    <span class="conn-info" id="conn-info">Connexion...</span>
  </div>

</div>

<!-- AUTH OVERLAY (admin) -->
<div class="auth-overlay hidden" id="auth-overlay">
  <div class="auth-title" id="t-auth-title">MOT DE PASSE ADMIN</div>
  <input class="auth-input" id="auth-input" type="password"
    placeholder="••••••••"
    onkeydown="if(event.key==='Enter') checkAuth()">
  <button class="auth-btn" onclick="checkAuth()" id="t-auth-btn">ACCEDER</button>
  <span class="auth-err hidden" id="auth-err" id="t-auth-err">Mot de passe incorrect</span>
  <button class="pill" onclick="cancelAuth()" style="margin-top:4px">Annuler</button>
</div>

<script>
// ─── ETAT DE L'APP ────────────────────────────────────────────
let lang     = 'FR'
let mode     = 'visitor'
let fanOn    = false
let running  = false
let connected= false
let pos      = { x: null, y: null, z: null }

// ─── TRADUCTIONS ──────────────────────────────────────────────
const TR = {
  FR: {
    'Visiteur':      'Visiteur',
    'Admin':         'Admin',
    't-choreo':      'Choreographies',
    't-actions':     'Actions',
    't-jog':         'Deplacement manuel',
    't-xy':          'X / Y',
    't-step':        'Pas (mm)',
    't-speed':       'Vitesse',
    't-temps':       'Temperatures',
    't-nozzle-l':    'BUSE',
    't-bed-l':       'PLATEAU',
    't-nozzle-s':    'cible : OFF',
    't-bed-s':       'cible : OFF',
    't-term-title':  'Terminal G-code',
    't-send':        'ENVOYER',
    't-auth-title':  'MOT DE PASSE ADMIN',
    't-auth-btn':    'ACCEDER',
    't-auth-err':    'Mot de passe incorrect',
    'fan-off':       'SOUFFLE — OFF',
    'fan-on':        'SOUFFLE — ON',
    'estop':         'ARRET D\'URGENCE',
    'choreo':        'CHOREOGRAPHIE',
    'choreo-sub':    'Sequence programmee',
    'conn-ok':       'En ligne',
    'conn-err':      'Hors ligne',
  },
  EN: {
    'Visiteur':      'Visitor',
    'Admin':         'Admin',
    't-choreo':      'Choreographies',
    't-actions':     'Actions',
    't-jog':         'Manual move',
    't-xy':          'X / Y',
    't-step':        'Step (mm)',
    't-speed':       'Speed',
    't-temps':       'Temperatures',
    't-nozzle-l':    'NOZZLE',
    't-bed-l':       'BED',
    't-nozzle-s':    'target: OFF',
    't-bed-s':       'target: OFF',
    't-term-title':  'G-code Terminal',
    't-send':        'SEND',
    't-auth-title':  'ADMIN PASSWORD',
    't-auth-btn':    'ENTER',
    't-auth-err':    'Wrong password',
    'fan-off':       'FAN — OFF',
    'fan-on':        'FAN — ON',
    'estop':         'EMERGENCY STOP',
    'choreo':        'CHOREOGRAPHY',
    'choreo-sub':    'Programmed sequence',
    'conn-ok':       'Online',
    'conn-err':      'Offline',
  }
}

function t(k) { return TR[lang][k] || k }

// ─── LANGUE ───────────────────────────────────────────────────
function toggleLang() {
  lang = lang === 'FR' ? 'EN' : 'FR'
  applyLang()
}

function applyLang() {
  document.getElementById('lang-btn').textContent = lang
  document.getElementById('v-btn').textContent    = t('Visiteur')
  document.getElementById('a-btn').textContent    = t('Admin')
  document.getElementById('fan-btn').textContent  = t(fanOn ? 'fan-on' : 'fan-off')
  document.getElementById('stop-btn').textContent = t('estop')
  const keys = ['t-choreo','t-actions','t-jog','t-xy','t-step','t-speed',
    't-temps','t-nozzle-l','t-bed-l','t-nozzle-s','t-bed-s',
    't-term-title','t-send','t-auth-title','t-auth-btn','t-auth-err']
  keys.forEach(k => {
    const el = document.getElementById(k)
    if (el) el.textContent = t(k)
  })
  renderChoreos()
  updateConnLabel()
}

// ─── MODES ────────────────────────────────────────────────────
function setMode(m) {
  if (m === 'admin') { showAuth(); return }
  activateMode('visitor')
}

function activateMode(m) {
  mode = m
  document.getElementById('visitor-view').classList.toggle('hidden', m !== 'visitor')
  document.getElementById('admin-view').classList.toggle('hidden', m !== 'admin')
  document.getElementById('v-btn').classList.toggle('active', m === 'visitor')
  document.getElementById('a-btn').classList.toggle('active', m === 'admin')
}

// ─── AUTH ─────────────────────────────────────────────────────
function showAuth() {
  document.getElementById('auth-overlay').classList.remove('hidden')
  document.getElementById('auth-input').value = ''
  document.getElementById('auth-err').classList.add('hidden')
  setTimeout(() => document.getElementById('auth-input').focus(), 100)
}

function cancelAuth() {
  document.getElementById('auth-overlay').classList.add('hidden')
}

function checkAuth() {
  const val = document.getElementById('auth-input').value
  if (val === CONFIG.ADMIN_PASSWORD) {
    document.getElementById('auth-overlay').classList.add('hidden')
    activateMode('admin')
  } else {
    document.getElementById('auth-err').classList.remove('hidden')
    document.getElementById('auth-input').value = ''
    document.getElementById('auth-input').focus()
  }
}

// ─── CHOREOS ──────────────────────────────────────────────────
function renderChoreos() {
  const list = document.getElementById('choreo-list')
  list.innerHTML = ''
  CHOREOS.forEach((c, i) => {
    const btn = document.createElement('button')
    btn.className = 'choreo-btn'
    btn.id = `choreo-${i}`
    btn.innerHTML = `
      <div>
        <span class="choreo-name">${t('choreo')} ${c.id}</span>
        <span class="choreo-sub">${t('choreo-sub')}</span>
      </div>
      <span class="choreo-num">${String(c.id).padStart(2,'0')}</span>
      <div class="choreo-progress" id="prog-${i}"></div>
    `
    btn.onclick = () => runChoreo(i)
    list.appendChild(btn)
  })
}

function runChoreo(idx) {
  if (running) return
  running = true
  const duration = CHOREOS[idx].gcode.length * 1200
  const btn  = document.getElementById(`choreo-${idx}`)
  const prog = document.getElementById(`prog-${idx}`)
  btn.classList.add('running')
  document.querySelectorAll('.choreo-btn').forEach(b => {
    if (b.id !== `choreo-${idx}`) b.classList.add('disabled')
  })
  const gcode = CHOREOS[idx].gcode.join('\n')
  sendToOctoPrint(gcode)
  log(`<span class="t-info">▶ ${t('choreo')} ${CHOREOS[idx].id}</span>`)
  const start = Date.now()
  const iv = setInterval(() => {
    const p = Math.min(100, (Date.now() - start) / duration * 100)
    prog.style.width = p + '%'
    if (p >= 100) {
      clearInterval(iv)
      prog.style.width = '0'
      btn.classList.remove('running')
      document.querySelectorAll('.choreo-btn').forEach(b => b.classList.remove('disabled'))
      running = false
      log(`<span class="t-ok">✓ ${lang === 'FR' ? 'Sequence terminee' : 'Sequence complete'}</span>`)
    }
  }, 80)
}

// ─── VENTILATEUR ──────────────────────────────────────────────
function toggleFan() {
  fanOn = !fanOn
  const btn = document.getElementById('fan-btn')
  btn.textContent = t(fanOn ? 'fan-on' : 'fan-off')
  btn.classList.toggle('fan-on', fanOn)
  const cmd = fanOn ? 'M106 S255' : 'M107'
  sendToOctoPrint(cmd)
  log(fanOn
    ? `<span class="t-ok">✓ ${cmd}</span>`
    : `<span class="t-info">i ${cmd}</span>`)
}

// ─── ARRET URGENCE ────────────────────────────────────────────
function eStop() {
  running = false
  document.querySelectorAll('.choreo-progress').forEach(p => p.style.width = '0')
  document.querySelectorAll('.choreo-btn').forEach(b => {
    b.classList.remove('running', 'disabled')
  })
  sendToOctoPrint('M112')
  log(`<span class="t-err">⬛ M112 — ESTOP</span>`)
}

// ─── JOG ──────────────────────────────────────────────────────
function jog(axis, dir) {
  const step = parseFloat(document.getElementById('step').value) || CONFIG.DEFAULT_STEP
  const feed = parseInt(document.getElementById('feed').value)   || CONFIG.DEFAULT_FEED
  const delta = +(step * dir).toFixed(2)
  const cmd = `G91\nG1 ${axis}${delta} F${feed}\nG90`
  sendToOctoPrint(cmd)
  log(`<span class="t-cmd">> G1 ${axis}${delta > 0 ? '+' : ''}${delta} F${feed}</span>`)
  fetchPosition()
}

function homeAll() {
  sendToOctoPrint('G28 XYZ')
  log(`<span class="t-ok">✓ G28 XYZ</span>`)
  pos = { x: 0, y: 0, z: 0 }
  updatePos()
}

// ─── TERMINAL ─────────────────────────────────────────────────
function sendGcode() {
  const inp = document.getElementById('gcin')
  const cmd = inp.value.trim()
  if (!cmd) return
  log(`<span class="t-cmd">> ${cmd}</span>`)
  sendToOctoPrint(cmd)
  inp.value = ''
}

function log(html) {
  const el = document.getElementById('log')
  el.innerHTML += html + '<br>'
  el.scrollTop = el.scrollHeight
}

// ─── OCTOPRINT API ────────────────────────────────────────────
async function sendToOctoPrint(commands) {
  const lines = commands.split('\n').filter(l => l.trim())
  try {
    const res = await fetch(`${CONFIG.OCTOPRINT_URL}/api/printer/command`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Api-Key': CONFIG.API_KEY
      },
      body: JSON.stringify({ commands: lines })
    })
    if (res.ok) {
      log(`<span class="t-ok">✓ ok</span>`)
    } else {
      log(`<span class="t-err">✗ Erreur ${res.status}</span>`)
    }
  } catch (e) {
    // En mode demo (pas de Pi connecte) on simule
    log(`<span class="t-cmd">[ demo ] ${lines[0]}</span>`)
  }
}

async function fetchTemperatures() {
  try {
    const res = await fetch(`${CONFIG.OCTOPRINT_URL}/api/printer`, {
      headers: { 'X-Api-Key': CONFIG.API_KEY }
    })
    if (!res.ok) throw new Error()
    const data = await res.json()
    const t0 = data.temperature
    if (t0) {
      if (t0.tool0) document.getElementById('tv-nozzle').textContent =
        Math.round(t0.tool0.actual) + '°'
      if (t0.bed) document.getElementById('tv-bed').textContent =
        Math.round(t0.bed.actual) + '°'
    }
    if (!connected) { connected = true; updateConnLabel() }
  } catch {
    if (connected) { connected = false; updateConnLabel() }
  }
}

async function fetchPosition() {
  try {
    const res = await fetch(`${CONFIG.OCTOPRINT_URL}/api/printer`, {
      headers: { 'X-Api-Key': CONFIG.API_KEY }
    })
    if (!res.ok) return
    const data = await res.json()
    if (data.state && data.state.flags && !data.state.flags.printing) {
      const res2 = await fetch(`${CONFIG.OCTOPRINT_URL}/api/printer/printhead`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Api-Key': CONFIG.API_KEY
        },
        body: JSON.stringify({ command: 'home', axes: [] })
      })
    }
  } catch {}
}

// ─── UI HELPERS ───────────────────────────────────────────────
function updatePos() {
  const fmt = v => v !== null ? v.toFixed(1) : '--'
  document.getElementById('px').textContent = fmt(pos.x)
  document.getElementById('py').textContent = fmt(pos.y)
  document.getElementById('pz').textContent = fmt(pos.z)
}

function updateConnLabel() {
  const dot = document.getElementById('status-dot')
  const lbl = document.getElementById('conn-info')
  if (connected) {
    dot.classList.remove('offline')
    lbl.textContent = t('conn-ok') + ' — ' + CONFIG.OCTOPRINT_URL.replace('http://','')
  } else {
    dot.classList.add('offline')
    lbl.textContent = t('conn-err')
  }
}

// ─── INIT ─────────────────────────────────────────────────────
renderChoreos()
applyLang()
updateConnLabel()
log('<span class="t-info">i REPLICATOR 2 — v1.0</span>')
log('<span class="t-info">i Festival du Peu 2026 — Le Broc</span>')
log('<span class="t-cmd">Connexion OctoPrint...</span>')

fetchTemperatures()
setInterval(fetchTemperatures, 5000)
</script>
