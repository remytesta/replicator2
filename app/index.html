<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#f4efe4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Replicator 2</title>
  <link rel="manifest" href="manifest.json?v=15">
  <link rel="stylesheet" href="styles.css?v=15">
</head>
<body>
  <main class="app-shell" id="app">
    <div class="stage-transition" id="stageTransition" aria-hidden="true"></div>

    <section class="screen screen-home is-active" id="homeScreen" aria-labelledby="homeTitle">
      <h1 class="sr-only" id="homeTitle">Replicator 2</h1>
      <div class="sketch-stage" id="sketchStage" aria-label="Dessin interactif Replicator 2">
        <div class="sketch-title" aria-hidden="true">Replicator 2</div>
        <div class="sketch-art">
          <div class="sketch-container">
            <img class="sketch-base" src="main/png/main-croquis.png" alt="Croquis de l'installation Replicator 2">
            <div class="sketch-hotspots" id="sketchHotspots"></div>
          </div>
        </div>
      </div>
      <aside class="scenario-sheet" id="scenarioSheet" aria-live="polite"></aside>
    </section>

    <section class="screen screen-console" id="consoleScreen" aria-labelledby="consoleTitle">
      <header class="topbar">
        <div>
          <p class="kicker">Machine</p>
          <h2 id="consoleTitle">Console</h2>
        </div>
        <button class="nav-action icon-action" data-route="home" type="button" aria-label="Retour au croquis">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        </button>
      </header>

      <div class="console-panel">
        <div class="console-status" id="consoleStatus">Pret</div>
        <div class="console-vase-grid" id="consoleVaseGrid"></div>
      </div>

      <div class="choreo-panel" id="choreoPanel"></div>
    </section>

    <section class="screen screen-vase" id="vaseScreen" aria-labelledby="vaseTitle">
      <header class="topbar">
        <div class="vase-heading">
          <img class="vase-heading-thumb" id="vaseSketchThumb" alt="">
          <div>
            <p class="kicker" id="vaseCount">Vase</p>
            <h2 id="vaseTitle">Vase</h2>
          </div>
        </div>
        <button class="nav-action icon-action" data-route="home" type="button" aria-label="Retour au croquis">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        </button>
      </header>

      <div class="vase-detail">
        <div class="vase-media" id="vaseMedia"></div>
      </div>

      <div class="slider-controls">
        <button class="arrow-btn" id="prevSlideBtn" type="button" aria-label="Face precedente">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5 8 12l7 7"/></svg>
        </button>
        <div class="slide-dots" id="slideDots"></div>
        <button class="arrow-btn" id="nextSlideBtn" type="button" aria-label="Face suivante">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 5 7 7-7 7"/></svg>
        </button>
      </div>

      <nav class="vase-nav" id="vaseNav" aria-label="Changer de vase"></nav>

      <article class="vase-copy">
        <img class="vase-copy-thumb" id="vaseCopyThumb" alt="">
        <div>
          <p class="slide-label" id="slideLabel">Face</p>
          <p class="slide-caption" id="slideCaption"></p>
          <p id="vaseDescription"></p>
        </div>
      </article>
    </section>
    <div class="coord-debug" id="coordDebug" aria-live="polite"></div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </main>

  <script src="vases-data.js?v=15"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(registrations => Promise.all(registrations.map(registration => registration.unregister())))
        .catch(() => {});
    }

    if ("caches" in window) {
      caches.keys()
        .then(keys => Promise.all(keys.map(key => caches.delete(key))))
        .catch(() => {});
    }
  </script>
  <script src="app.js?v=15"></script>
</body>
</html>
