<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#171511">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Replicator 2</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell" id="app">
    <div class="stage-transition" id="stageTransition" aria-hidden="true"></div>

    <section class="screen screen-home is-active" id="homeScreen" aria-labelledby="homeTitle">
      <button class="nav-action nav-action-home" id="enterChapelBtn" type="button">
        Acceder a la chapelle
      </button>

      <div class="home-composition">
        <div class="home-image-wrap" id="homeImageWrap"></div>
        <div class="home-copy">
          <p class="kicker">Installation interactive</p>
          <h1 id="homeTitle">Replicator 2</h1>
          <p class="home-subtitle">Carte vivante, vases en rotation, choregraphies programmees.</p>
        </div>
      </div>
    </section>

    <section class="screen screen-chapel" id="chapelScreen" aria-labelledby="chapelTitle">
      <header class="topbar">
        <div>
          <p class="kicker">Plan de la chapelle</p>
          <h2 id="chapelTitle">Replicator 2</h2>
        </div>
        <button class="nav-action" id="chapelHomeBtn" type="button">Chapelle</button>
      </header>

      <div class="chapel-map" id="chapelMap" aria-label="Carte interactive des vases">
        <div class="chapel-floor">
          <div class="altar">
            <span class="altar-table"></span>
            <span class="altar-cross"></span>
            <span class="altar-label">Autel</span>
          </div>
          <div class="nave nave-main"></div>
          <div class="nave nave-left"></div>
          <div class="nave nave-right"></div>
          <div class="raspberry-node" aria-label="Raspberry Pi central">
            <span></span>
            <strong>Pi</strong>
          </div>
          <div class="plateau-layer" id="plateauLayer"></div>
        </div>
      </div>

      <button class="console-fab" id="consoleBtn" type="button">Console</button>
    </section>

    <section class="screen screen-console" id="consoleScreen" aria-labelledby="consoleTitle">
      <header class="topbar">
        <div>
          <p class="kicker">Tablette physique</p>
          <h2 id="consoleTitle">Console</h2>
        </div>
        <button class="nav-action" data-route="chapel" type="button">Chapelle</button>
      </header>

      <div class="console-panel">
        <div class="console-status" id="consoleStatus">Pret</div>
        <div class="console-vase-grid" id="consoleVaseGrid"></div>
      </div>

      <div class="choreo-panel" id="choreoPanel"></div>
    </section>

    <section class="screen screen-vase" id="vaseScreen" aria-labelledby="vaseTitle">
      <header class="topbar">
        <div>
          <p class="kicker" id="vaseCount">Vase</p>
          <h2 id="vaseTitle">Vase</h2>
        </div>
        <button class="nav-action" data-route="chapel" type="button">Chapelle</button>
      </header>

      <div class="vase-detail">
        <div class="vase-media" id="vaseMedia"></div>
        <article class="vase-copy">
          <p class="slide-label" id="slideLabel">Face</p>
          <p id="vaseDescription"></p>
        </article>
      </div>

      <div class="slider-controls">
        <button class="arrow-btn" id="prevSlideBtn" type="button" aria-label="Face precedente">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5 8 12l7 7"/></svg>
        </button>
        <div class="slide-dots" id="slideDots"></div>
        <button class="arrow-btn" id="nextSlideBtn" type="button" aria-label="Face suivante">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 5 7 7-7 7"/></svg>
        </button>
      </div>

      <nav class="vase-nav" id="vaseNav" aria-label="Changer de vase"></nav>
    </section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </main>

  <script src="vases-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
